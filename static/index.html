<style>
  :root {

  .refresh:hover { background: #34413d; box-shadow: 0 5px 12px rgba(27, 36, 34, .16); transform: translateY(-1px); }

  .provider { position: relative; border: 1px solid rgba(220, 222, 214, .9); border-radius: var(--radius); background: rgba(252, 251, 248, .86); box-shadow: var(--shadow); overflow: hidden; }
  .provider::before { position: absolute; top: 0; left: 0; width: 100%; height: 4px; content: ""; background: var(--codex); }
  #card-claude::before { background: var(--claude); }

  .provider-name { font-size: 20px; letter-spacing: -.04em; font-weight: 700; }

  .windows { padding: 0 22px; }
  .window { padding: 17px 0 16px; border-bottom: 1px solid var(--line); }

  .window-label { color: var(--muted); font-size: 13px; font-weight: 500; }
  .window-value { display: inline-flex; align-items: baseline; gap: .14em; color: var(--ink); font-size: clamp(28px, 3vw, 36px); line-height: .9; font-weight: 650; letter-spacing: 0; }
  .window-number { letter-spacing: -.045em; font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  .window-bottom span:last-child { overflow: hidden; text-align: right; text-overflow: ellipsis; white-space: nowrap; }

  .range button { height: 100%; border: 0; border-radius: 6px; padding: 0 11px; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; transition: background .2s, color .2s; }
  .range button:hover { color: var(--ink); background: #f2f2ed; }
  .range button.active { background: var(--ink); color: #fff; }
  .series-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .series-picker button { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; color: var(--muted); background: var(--surface-strong); cursor: pointer; font-size: 12px; transition: transform .2s, border-color .2s, color .2s, background .2s; }
  .series-picker button:hover { border-color: var(--faint); color: var(--ink); transform: translateY(-1px); }
  .series-picker button[aria-pressed="true"] { border-color: var(--ink); color: var(--ink); background: #f2f4ef; }

  .chart-tooltip strong { font-size: 14px; font-variant-numeric: tabular-nums; }

  .chart-caption { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 12px; }

<body>
  <header class="app-header">
    <h1>Token Monitor</h1>
  </header>

  <main>
    <section class="provider-grid" aria-label="目前用量">
      <article class="provider" id="card-claude">
        <div class="provider-header"><h2 class="provider-name">Claude</h2><span class="plan" id="plan-claude"></span></div>
        <div class="windows" id="body-claude"><p class="skeleton">正在讀取 Claude 用量</p></div>
      </article>
      <article class="provider" id="card-codex">
        <div class="provider-header"><h2 class="provider-name">Codex</h2><span class="plan" id="plan-codex"></span></div>
        <div class="windows" id="body-codex"><p class="skeleton">正在讀取 Codex 用量</p></div>
      </article>
    </section>

    <section class="history" aria-labelledby="history-title">
      <div class="history-head">
        <div class="history-title">
          <h2 id="history-title">用量變化</h2>
          <p class="history-note">選擇要比較的額度視窗，查看累積用量。</p>
        </div>
        <div class="history-controls">
          <div class="range" aria-label="歷史時間範圍">
            <button type="button" data-hours="24" aria-pressed="false">24 小時</button>
            <button type="button" data-hours="168" class="active" aria-pressed="true">7 天</button>
          </div>
          <span class="updated" id="updated" aria-live="polite">正在取得最新用量</span>
          <button class="refresh" id="refresh" type="button" aria-label="更新用量" title="更新用量">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 0 1-15.3 6.4"/>
              <path d="M3 12a9 9 0 0 1 15.3-6.4"/>
              <path d="M17.6 3.6v4.4H13.2M6.4 20.4V16H10.8"/>
            </svg>
          </button>
          <button class="fullscreen-btn" id="fullscreen-btn" type="button" aria-label="切換全螢幕" title="切換全螢幕">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="series-picker" id="series-picker" aria-label="圖表數列"></div>
      <div class="chart-shell" id="chart-shell">
        <svg id="chart" role="img" aria-label="用量歷史折線圖"></svg>
        <div class="chart-tooltip" id="chart-tooltip" role="status"></div>
        <div class="chart-empty" id="chart-empty">尚無足夠的歷史資料</div>
      </div>
      <div class="chart-caption"><span>0% 已用</span><span>100% 已用</span></div>
    </section>
  </main>

<script>
const $ = id => document.getElementById(id);
let chartHours = 168;
let historyData = {};
let activeSeries = new Set();
let currentWindowKeys = new Set();
const seriesStyles = {
  'claude:5h': { color: '#b45132', dash: '' },
  'claude:weekly': { color: '#7a5b9a', dash: '8 5' },
  'claude:weekly_scoped': { color: '#8a7000', dash: '2 4' },
  'codex:primary': { color: '#207b6d', dash: '' },
  'codex:weekly': { color: '#207b6d', dash: '' },
};
function styleForSeries(key) {
  return seriesStyles[key] || { color: key.startsWith('claude:') ? '#c96c47' : '#207b6d', dash: '' };
}
function seriesRank(key) {
  const ranks = {
    'claude:5h': 0,
    'claude:weekly': 1,
    'claude:weekly_scoped': 2,
    'codex:primary': 3,
    'codex:weekly': 3,
  };
  return ranks[key] ?? (key.startsWith('claude:') ? 10 : 20);
}
function orderedSeriesKeys() {
  return Object.keys(historyData)
    .filter(key => !currentWindowKeys.size || currentWindowKeys.has(key))
    .sort((a, b) => seriesRank(a) - seriesRank(b) || a.localeCompare(b));
}

function usageColor(percent) {
  return percent >= 85 ? 'var(--danger)' : percent >= 60 ? 'var(--warning)' : 'var(--safe)';
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' })[char]);
}
function resetText(resetsAt) {
  if (!resetsAt) return '重置時間未知';
  const left = resetsAt - Math.floor(Date.now() / 1000);
  if (left <= 0) return '等待重置資料更新';
  const days = Math.floor(left / 86400), hours = Math.floor(left % 86400 / 3600), minutes = Math.floor(left % 3600 / 60);
  const remaining = days ? `${days} 天 ${hours} 小時後` : hours ? `${hours} 小時 ${minutes} 分後` : `${minutes} 分後`;
  const date = new Date(resetsAt * 1000).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
  return `${remaining}重置 (${date})`;
}
function renderProvider(name, data) {
  const body = $('body-' + name), plan = $('plan-' + name);
  if (!data) { body.innerHTML = '<p class="skeleton">等待服務回應</p>'; return; }
  if (!data.ok) { plan.textContent = ''; body.innerHTML = `<p class="error">${escapeHtml(data.error || '無法讀取用量')}</p>`; return; }
  plan.textContent = data.plan || '';
  body.innerHTML = (data.windows || []).map(window => {
    const value = Math.max(0, Math.min(Number(window.used_percent) || 0, 100));
    return `<div class="window">
      <div class="window-top"><span class="window-label">${escapeHtml(window.label)}</span><strong class="window-value" aria-label="${value}%" style="color:${usageColor(value)}"><span class="window-number">${value}</span><span class="window-unit" aria-hidden="true">%</span></strong></div>
      <div class="usage-rule" aria-label="${escapeHtml(window.label)} 已用 ${value}%"><span style="width:${value}%;background:${usageColor(value)}"></span></div>
      <div class="window-bottom"><span>已用額度</span><span>${escapeHtml(resetText(window.resets_at))}</span></div>
    </div>`;
  }).join('') || '<p class="skeleton">沒有可顯示的額度視窗</p>';
}
function displayName(key) {
  const [provider, id] = key.split(':');
  const names = { primary: '每週額度', weekly: '每週額度', weekly_scoped: '每週模型額度', '5h': '5 小時額度' };
  return `${provider === 'claude' ? 'Claude' : 'Codex'} ${names[id] || id}`;
}
function renderPicker() {
  const picker = $('series-picker');
  const keys = orderedSeriesKeys().filter(key => historyData[key]?.length);
  if (!keys.length) { picker.innerHTML = ''; return; }
  if (!activeSeries.size) keys.forEach(key => activeSeries.add(key));
  picker.innerHTML = keys.map(key => {
    const style = styleForSeries(key); const selected = activeSeries.has(key);
    return `<button type="button" data-series="${escapeHtml(key)}" style="--series-color:${style.color}" aria-pressed="${selected}"><i class="series-mark" style="background:${style.color}"></i>${escapeHtml(displayName(key))}</button>`;
  }).join('');
  picker.querySelectorAll('button').forEach(button => button.onclick = () => {
    const key = button.dataset.series;
    activeSeries.has(key) ? activeSeries.delete(key) : activeSeries.add(key);
    renderPicker(); renderChart();
  });
}
function renderChart() {
  const svg = $('chart'), empty = $('chart-empty');
  const keys = orderedSeriesKeys().filter(key => activeSeries.has(key) && historyData[key]?.length);
  const rect = svg.getBoundingClientRect(); const width = Math.max(280, Math.round(rect.width || 600)); const height = Math.max(60, Math.round(rect.height || 180));
  const pad = { left: 26, right: 26, top: 10, bottom: 20 };
  const now = Math.floor(Date.now() / 1000), since = now - chartHours * 3600;
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.innerHTML = '';
  empty.style.display = keys.length ? 'none' : 'grid';
  if (!keys.length) return;
  const x = timestamp => pad.left + (width - pad.left - pad.right) * ((timestamp - since) / (now - since));
  const y = percent => pad.top + (height - pad.top - pad.bottom) * (1 - Math.max(0, Math.min(percent, 100)) / 100);
  const elements = [];
  [0, 25, 50, 75, 100].forEach(percent => {
    const yy = y(percent); elements.push(`<line x1="${pad.left}" y1="${yy}" x2="${width-pad.right}" y2="${yy}" stroke="#e6e7e3" stroke-width="1"/>`);
    if (percent === 0 || percent === 50 || percent === 100) {
      elements.push(`<text x="${pad.left - 8}" y="${yy + 4}" text-anchor="end" fill="#727772" font-size="10">${percent}</text>`);
      elements.push(`<text x="${width - pad.right + 20}" y="${yy + 4}" text-anchor="end" fill="#a6aaa5" font-size="10">${percent}</text>`);
    }
  });
  const labels = chartHours === 24 ? [0, 4, 8, 12, 16, 20, 24] : [0, 1, 2, 3, 4, 5, 6, 7];
  labels.forEach(value => {
    const timestamp = chartHours === 24 ? since + value * 3600 : since + value * 86400;
    const label = chartHours === 24 ? `${String(value).padStart(2, '0')}:00` : new Date(timestamp * 1000).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
    elements.push(`<text x="${x(timestamp)}" y="${height - 5}" text-anchor="middle" fill="#727772" font-size="10">${label}</text>`);
  });
  keys.forEach(key => {
    const points = historyData[key].filter(point => point[0] >= since && point[0] <= now);
    if (!points.length) return;
    const style = styleForSeries(key);
    const path = points.map((point, index) => `${index ? 'L' : 'M'}${x(point[0]).toFixed(1)},${y(point[1]).toFixed(1)}`).join(' ');
    elements.push(`<path d="${path}" fill="none" stroke="${style.color}" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"${style.dash ? ` stroke-dasharray="${style.dash}"` : ''}/> `);
  });
  svg.innerHTML = elements.join('');
  svg.onpointermove = event => showTooltip(event, keys, { x, y, since, now, width, pad });
  svg.onpointerleave = () => $('chart-tooltip').style.display = 'none';
}
function showTooltip(event, keys, map) {
  const svg = $('chart'), shell = $('chart-shell'), tooltip = $('chart-tooltip');
  const rect = svg.getBoundingClientRect(); const position = Math.max(0, Math.min(1, (event.clientX - rect.left - map.pad.left) / (rect.width - map.pad.left - map.pad.right)));
  const timestamp = map.since + position * (map.now - map.since);
  const values = keys.map(key => {
    const points = historyData[key].filter(point => point[0] >= map.since && point[0] <= map.now);
    return { key, point: points.reduce((closest, point) => !closest || Math.abs(point[0] - timestamp) < Math.abs(closest[0] - timestamp) ? point : closest, null) };
  }).filter(item => item.point);
  if (!values.length) return;
  const date = new Date(timestamp * 1000).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
  tooltip.innerHTML = `<span>${date}</span>${values.map(item => `<br><strong style="color:${styleForSeries(item.key).color}">${item.point[1]}%</strong> ${escapeHtml(displayName(item.key))}`).join('')}`;
  tooltip.style.display = 'block';
  const shellRect = shell.getBoundingClientRect(); const left = Math.min(shellRect.width - 150, Math.max(8, event.clientX - shellRect.left + 12));
  tooltip.style.left = `${left}px`; tooltip.style.top = '18px';
}
async function loadUsage(fresh) {
  try {
    const response = await fetch('/api/usage' + (fresh ? '?fresh=1' : ''));
    const data = await response.json();
    currentWindowKeys.clear();
    if (data.claude?.windows) data.claude.windows.forEach(w => currentWindowKeys.add(`claude:${w.id}`));
    if (data.codex?.windows) data.codex.windows.forEach(w => currentWindowKeys.add(`codex:${w.id}`));
    renderProvider('claude', data.claude); renderProvider('codex', data.codex);
    $('updated').textContent = data.updated_at ? `最後更新 ${new Date(data.updated_at * 1000).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false })}` : '尚未取得更新時間';
    if (Object.keys(historyData).length) { renderPicker(); renderChart(); }
  } catch (_) { $('updated').textContent = '目前無法連線到監測服務'; }
}
async function loadHistory() {
  try { const response = await fetch('/api/history?hours=' + chartHours); historyData = await response.json(); renderPicker(); renderChart(); } catch (_) { historyData = {}; renderPicker(); renderChart(); }
}
document.querySelectorAll('.range button').forEach(button => button.onclick = () => {
  chartHours = Number(button.dataset.hours);
  document.querySelectorAll('.range button').forEach(item => { const current = item === button; item.classList.toggle('active', current); item.setAttribute('aria-pressed', String(current)); });
  loadHistory();
});
$('refresh').onclick = async () => {
  const button = $('refresh'); button.disabled = true; button.classList.add('spinning');
  await loadUsage(true); await loadHistory(); button.disabled = false; button.classList.remove('spinning');
};
$('fullscreen-btn').onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else if (document.exitFullscreen) {
    document.exitFullscreen().catch(() => {});
  }
};
window.addEventListener('resize', renderChart);
loadUsage(true).then(loadHistory);
setInterval(() => loadUsage(false), 60000);
setInterval(loadHistory, 300000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
